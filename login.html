<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In - GamePrice AI</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="description" content="Sign in to GamePrice AI to analyze game prices and get deal recommendations.">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>

  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">🎮</div>
        <span>GamePrice AI</span>
      </a>

      <div class="nav-links hidden md:flex">
        <a href="free-games.html" class="nav-link">Free Games</a>
      </div>

      <div class="nav-buttons">
        <a href="signup.html" class="btn btn-secondary">Sign Up</a>
      </div>
    </div>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Welcome Back</h1>
        <p class="auth-subtitle">Sign in to continue analyzing game prices</p>
      </div>

      <!-- Error Message -->
      <div id="auth-error" class="alert alert-error hidden"></div>

      <!-- Login Form -->
      <form id="login-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" id="email" class="form-input" placeholder="you@example.com" required autocomplete="email">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input type="password" id="password" class="form-input" placeholder="Enter your password" required
            autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary btn-full">
          Sign In
        </button>
      </form>

      <div class="auth-divider">or</div>

      <!-- Google Sign In -->
      <button id="google-signin-btn" class="btn btn-google btn-full">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        Continue with Google
      </button>

      <!-- Test Account Section -->
      <div class="auth-divider">test account</div>

      <div
        style="background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), rgba(139, 92, 246, 0.1)); border: 1px solid rgba(59, 130, 246, 0.3); border-radius: var(--radius-md); padding: 1rem; margin-bottom: 1rem;">
        <p style="margin: 0 0 0.75rem; font-size: 0.875rem; color: var(--text-secondary); text-align: center;">
          <strong>🧪 Test Credentials</strong><br>
          Use these to test the app without creating an account
        </p>
        <div
          style="background: var(--bg-tertiary); padding: 0.75rem; border-radius: var(--radius-sm); font-family: monospace; font-size: 0.875rem; margin-bottom: 0.75rem;">
          <p style="margin: 0; color: var(--text-secondary);">Email: <span
              style="color: var(--accent-primary);">test@gameprice.ai</span></p>
          <p style="margin: 0; color: var(--text-secondary);">Password: <span
              style="color: var(--accent-primary);">Test123456</span></p>
        </div>
        <button id="test-login-btn" class="btn btn-purple btn-full" style="font-size: 0.875rem;">
          ⚡ Quick Login with Test Account
        </button>
      </div>

      <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Sign up</a></p>
        <p class="mt-2"><a href="forgot-password.html">Forgot password?</a></p>
      </div>
    </div>
  </div>

  <!-- Application Scripts -->
  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/stripe.js"></script>
  <script src="js/app.js"></script>
</body>

</html>
