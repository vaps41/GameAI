<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis History - GamePrice AI</title>
  <meta name="description" content="View your game price analysis history on GamePrice AI.">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>

  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">🎮</div>
        <span>GamePrice AI</span>
      </a>

      <div class="nav-links hidden md:flex">
        <a href="dashboard.html" class="nav-link">Dashboard</a>
        <a href="favorites.html" class="nav-link">Favorites</a>
        <a href="history.html" class="nav-link active">History</a>
        <a href="free-games.html" class="nav-link">Free Games</a>
        <a href="account.html" class="nav-link">Account</a>
      </div>

      <div class="nav-buttons" style="display: flex; align-items: center; gap: 0.75rem;">
        <div class="usage-display">
          <span class="usage-badge">Loading...</span>
        </div>
        <a href="dashboard.html" class="btn btn-primary" style="margin-right: 10px;">Back to Game Analysis</a>
        <button id="logout-btn" class="btn btn-secondary">Logout</button>
      </div>
    </div>
  </nav>

  <!-- History Page -->
  <main class="dashboard">
    <div class="container-narrow">
      <!-- Page Header -->
      <div class="dashboard-header">
        <h1 class="dashboard-title">📜 Analysis History</h1>
        <p style="color: var(--text-secondary);">
          All the games you've analyzed. Track your research over time.
        </p>
      </div>

      <!-- History Container -->
      <div id="history-container">
        <div class="text-center" style="padding: 3rem;">
          <span class="spinner"></span>
          <p style="color: var(--text-muted); margin-top: 1rem;">Loading history...</p>
        </div>
      </div>

      <!-- Clear History Button -->
      <div class="text-center" style="margin-top: 2rem;">
        <button id="clear-history-btn" class="btn btn-secondary"
          style="border-color: var(--accent-danger); color: var(--accent-danger);">
          🗑️ Clear History
        </button>
      </div>

      <!-- Analyze More CTA -->
      <div class="account-card" style="margin-top: 2rem; text-align: center;">
        <p style="color: var(--text-secondary); margin-bottom: 1rem;">
          Want to analyze more games?
        </p>
        <a href="dashboard.html" class="btn btn-primary">
          Analyze a Game
        </a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p class="footer-text">
        © 2024 GamePrice AI. All rights reserved.
      </p>
    </div>
  </footer>

  <!-- Application Scripts -->
  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/stripe.js"></script>
  <script src="js/app.js"></script>


</body>

</html>
