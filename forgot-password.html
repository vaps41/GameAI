<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - GamePrice AI</title>
  <meta name="description" content="Reset your GamePrice AI account password.">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
  
  <!-- Stripe.js -->
  <script src="https://js.stripe.com/v3/"></script>
  
  <!-- Custom Styles -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar">
    <div class="navbar-content">
      <a href="index.html" class="logo">
        <div class="logo-icon">🎮</div>
        <span>GamePrice AI</span>
      </a>
      
      <div class="nav-buttons">
        <a href="login.html" class="btn btn-secondary">Back to Login</a>
      </div>
    </div>
  </nav>

  <!-- Auth Page -->
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">Reset Password</h1>
        <p class="auth-subtitle">Enter your email to receive a password reset link</p>
      </div>
      
      <!-- Success Message -->
      <div id="success-message" class="alert alert-success hidden">
        Password reset email sent! Check your inbox.
      </div>
      
      <!-- Error Message -->
      <div id="auth-error" class="alert alert-error hidden"></div>
      
      <!-- Reset Form -->
      <form id="reset-form">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            class="form-input" 
            placeholder="you@example.com"
            required
            autocomplete="email"
          >
        </div>
        
        <button type="submit" class="btn btn-primary btn-full">
          Send Reset Link
        </button>
      </form>
      
      <div class="auth-footer">
        <p>Remember your password? <a href="login.html">Sign in</a></p>
      </div>
    </div>
  </div>

  <!-- Application Scripts -->
  <script src="js/config.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/stripe.js"></script>
  <script src="js/app.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const resetForm = document.getElementById('reset-form');
      const errorElement = document.getElementById('auth-error');
      const successElement = document.getElementById('success-message');
      
      if (resetForm) {
        resetForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          
          const email = document.getElementById('email').value;
          const submitBtn = resetForm.querySelector('button[type="submit"]');
          
          // Hide previous messages
          errorElement.classList.add('hidden');
          successElement.classList.add('hidden');
          
          // Set loading
          submitBtn.disabled = true;
          submitBtn.innerHTML = '<span class="spinner"></span> Sending...';
          
          if (window.Auth) {
            const result = await window.Auth.resetPassword(email);
            
            if (result.success) {
              successElement.classList.remove('hidden');
              resetForm.reset();
            } else {
              errorElement.textContent = result.error;
              errorElement.classList.remove('hidden');
            }
          }
          
          submitBtn.disabled = false;
          submitBtn.innerHTML = 'Send Reset Link';
        });
      }
    });
  </script>
</body>
</html>
